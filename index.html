<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホロリズム プロフィールメーカー 完全版</title>
  <style>
    body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; padding: 20px; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; }
    
    /* 一番上の画像エリアのスタイル（ページの横幅600pxに最適化） */
    .header-image-container {
      width: 100%;
      max-width: 600px;
      margin-bottom: 20px;
      text-align: center;
      box-sizing: border-box;
      padding: 0 10px; /* スマホ画面で左右に少し余白を作って綺麗に見せる */
    }
    .header-image-container img {
      width: 100%;       /* 枠の横幅いっぱいに広げる */
      height: auto;      /* 縦横比を維持したまま自動調整 */
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; margin-bottom: 20px; box-sizing: border-box; }
    
    /* タイトル（h2）を中央寄せにするスタイルを追加 */
    .container h2 {
      text-align: center;
      margin-top: 5px;
      margin-bottom: 20px;
    }

    .step { background: #fff9c4; padding: 8px; border-radius: 6px; margin-bottom: 12px; font-weight: bold; font-size: 14px; border-left: 5px solid #fbc02d; }
    .item { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
    input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
    .radio-group { display: flex; gap: 20px; margin: 10px 0; background: #f9f9f9; padding: 10px; border-radius: 6px; }
    .song-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    
    .preview-area { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 600px; box-sizing: border-box; }
    #canvas { display: none; }
    #previewImage { max-width: 100%; height: auto; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; }
    
    /* 案内文字のサイズ */
    .save-instruction { font-size: 18px; color: #ff4081; font-weight: bold; margin-bottom: 12px; }
    .note { font-size: 12px; color: #666; margin-top: 10px; }

    /* X（旧Twitter）ポストボタンのスタイル */
    .share-btn-container { margin: 15px 0 5px 0; }
    .x-share-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #000000;
      color: #ffffff;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      width: 80%;
      transition: background-color 0.2s, transform 0.1s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .x-share-btn:hover { background-color: #272727; }
    .x-share-btn:active { transform: scale(0.98); }
  </style>
</head>
<body>

<!-- 一番上のヘッダー画像 -->
<div class="header-image-container">
  <img src="https://github.com/digitaltech0222-ai/holo3/blob/main/%E3%83%AD%E3%82%B4.jpg?raw=true" alt="イベントヘッダー画像">
</div>

<div class="container">
  <h2>#ホロリズム 参加表明画像メーカー</h2>

  <div class="step">1. プロフィール入力</div>
  <div class="item"><label>ネーム</label><input type="text" id="name" placeholder="お名前" class="input-field"></div>
  
  <div class="item"><label>推しのホロメン（改行可）</label>
    <textarea id="oshi" rows="2" placeholder="推しを記入" class="input-field"></textarea>
  </div>
  
  <div class="item">
    <label>リクエスト曲（最大4つ）</label>
    <div class="song-grid">
      <input type="text" id="song1" placeholder="曲名1" class="input-field">
      <input type="text" id="song2" placeholder="曲名2" class="input-field">
      <input type="text" id="song3" placeholder="曲名3" class="input-field">
      <input type="text" id="song4" placeholder="曲名4" class="input-field">
    </div>
  </div>

  <div class="item">
    <label>フリースペース（改行可能）</label>
    <textarea id="free" rows="3" placeholder="コメントやコスプレ詳細など" class="input-field"></textarea>
  </div>
  
  <div class="step">2. プロフィール画像とタイプの選択</div>
  <div class="item">
    <label>左側の枠に入れる画像</label>
    <input type="file" id="userImgInput" accept="image/*">
  </div>

  <div class="radio-group">
    <label><input type="radio" name="type" value="general" checked> 一般参加</label>
    <label><input type="radio" name="type" value="cosplay"> コスプレ</label>
  </div>
</div>

<div class="preview-area">
  <div class="save-instruction">↓画像を長押し or 右クリックで保存</div>
  <canvas id="canvas"></canvas>
  <img id="previewImage" alt="プロフィールプレビュー">
  
  <!-- ポスト用ボタン -->
  <div class="share-btn-container">
    <button id="xShareBtn" class="x-share-btn">Xにポストする</button>
  </div>
  
  <p class="note">※入力内容は自動で反映されます<br>※仕様上画像は自動添付されないため、保存して手動で添付してください</p>
</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const previewImage = document.getElementById('previewImage');
  
  // デフォルト背景
  const currentBgSrc = "https://images.weserv.nl/?url=files.twvt.me/images/twinvite/eventimage/201190095_20260614223218.jpg";

  const CONFIG = {
    fontFamily: '"Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif'
  };

  function drawSingleLineText(ctx, text, x, y, maxWidth, initialFontSize) {
    if (!text) return;
    let fontSize = initialFontSize;
    ctx.font = `bold ${fontSize}px ${CONFIG.fontFamily}`;
    while (ctx.measureText(text).width > maxWidth && fontSize > 12) {
      fontSize -= 1;
      ctx.font = `bold ${fontSize}px ${CONFIG.fontFamily}`;
    }
    ctx.fillText(text, x, y);
  }

  function drawSafeMultiLineText(ctx, text, x, y, maxWidth, maxHeight, initialFontSize) {
    if (!text) return;
    let fontSize = initialFontSize;
    let lines = text.split('\n');
    let lineHeight = fontSize * 1.2;

    while (fontSize > 14) {
      ctx.font = `bold ${fontSize}px ${CONFIG.fontFamily}`;
      const widthOk = lines.every(line => ctx.measureText(line).width <= maxWidth);
      const heightOk = (lines.length * lineHeight) <= maxHeight;
      if (widthOk && heightOk) break;
      fontSize -= 1;
      lineHeight = fontSize * 1.2;
    }

    const maxVisibleLines = Math.floor(maxHeight / lineHeight);
    if (lines.length > maxVisibleLines) {
      lines = lines.slice(0, maxVisibleLines);
      lines[lines.length - 1] += "...";
    }

    lines.forEach((line, i) => {
      let currentLineFontSize = fontSize;
      ctx.font = `bold ${currentLineFontSize}px ${CONFIG.fontFamily}`;
      while (ctx.measureText(line).width > maxWidth && currentLineFontSize > 11) {
        currentLineFontSize -= 1;
        ctx.font = `bold ${currentLineFontSize}px ${CONFIG.fontFamily}`;
      }
      ctx.fillText(line, x, y + (i * lineHeight));
    });
  }

  async function generate() {
    const userFile = document.getElementById('userImgInput').files[0];

    try {
      const bgImg = await loadImage(currentBgSrc);
      canvas.width = bgImg.width;
      canvas.height = bgImg.height;
      ctx.drawImage(bgImg, 0, 0);

      if (userFile) {
        ctx.save();
        const fx = 88, fy = 210, fw = 400, fh = 370, r = 30;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(fx, fy, fw, fh, r);
        else ctx.rect(fx, fy, fw, fh);
        ctx.clip();
        const userImg = await loadImage(await readFileAsDataURL(userFile));
        const scale = Math.max(fw / userImg.width, fh / userImg.height);
        ctx.drawImage(userImg, fx + (fw - userImg.width * scale) / 2, fy + (fh - userImg.height * scale) / 2, userImg.width * scale, userImg.height * scale);
        ctx.restore();
      }

      ctx.textBaseline = "top";
      ctx.fillStyle = "#333";
      ctx.textAlign = "center";
      drawSingleLineText(ctx, document.getElementById('name').value, 300, 760, 320, 50);
      
      ctx.textAlign = "left";
      drawSafeMultiLineText(ctx, document.getElementById('oshi').value, 660, 280, 480, 160, 42);

      const sX1 = 660, sX2 = 1047, sW = 340;
      drawSingleLineText(ctx, document.getElementById('song1').value, sX1, 490, sW, 34);
      drawSingleLineText(ctx, document.getElementById('song2').value, sX2, 490, sW, 34);
      drawSingleLineText(ctx, document.getElementById('song3').value, sX1, 550, sW, 34);
      drawSingleLineText(ctx, document.getElementById('song4').value, sX2, 550, sW, 34);

      drawSafeMultiLineText(ctx, document.getElementById('free').value, 660, 720, 620, 100, 36);

      const type = document.querySelector('input[name="type"]:checked').value;
      ctx.strokeStyle = "red";
      ctx.lineWidth = 5;
      if (type === 'general') drawEllipse(ctx, 190, 620, 80, 35); 
      else drawEllipse(ctx, 395, 620, 80, 35); 

      previewImage.src = canvas.toDataURL('image/png');
    } catch (e) { 
      console.error("生成エラー:", e); 
    }
  }

  document.querySelectorAll('.input-field').forEach(el => el.addEventListener('input', generate));
  document.querySelectorAll('input[name="type"]').forEach(el => el.addEventListener('change', generate));
  document.getElementById('userImgInput').addEventListener('change', generate);

  function drawEllipse(ctx, x, y, rx, ry) {
    ctx.beginPath(); ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2); ctx.stroke();
  }

  function loadImage(src) {
    return new Promise((resolve, reject) => {
      const i = new Image(); 
      i.crossOrigin = "anonymous";
      i.onload = () => resolve(i); 
      i.onerror = (e) => reject(new Error("画像の読み込みに失敗しました: " + src)); 
      i.src = src;
    });
  }

  function readFileAsDataURL(file) {
    return new Promise(r => {
      const f = new FileReader(); f.onload = e => r(e.target.result); f.readAsDataURL(file);
    });
  }

  // X（旧Twitter）ポストイベント処理（改行対応版）
  document.getElementById('xShareBtn').addEventListener('click', () => {
    const nameInput = document.getElementById('name').value.trim();
    
    let textBody = nameInput ? `${nameInput}のホロリズム参加表明！` : "ホロリズム参加表明を作成しました！";
    
    const fullText = `${textBody}\n\n #ホロリズム\n #ホロリズム20260829参加表明`;
    
    const xUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(fullText)}`;
    window.open(xUrl, '_blank');
  });

  window.onload = () => generate();
</script>
</body>
</html>
